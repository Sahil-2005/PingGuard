spring:
  application:
    name: pingguard-server

  mail:
    host: sandbox.smtp.mailtrap.io
    port: 2525
    username: ${MAIL_USER:9374998f5a4010}          # 🔄 Updated for environment injection
    password: ${MAIL_PASSWORD:6a109676561ac8}      # 🔄 Updated for environment injection
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/pingguard}               # 🔄 Updated for Aiven production URI
    username: ${DB_USER:pingguard_admin}                                   # 🔄 Updated for Aiven username
    password: ${DB_PASSWORD:my_super_secret_password_123}                   # 🔄 Updated for Aiven password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns schema; Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true     # Baseline existing DB so V1 is not re-run
    baseline-version: 0           # Treat any pre-Flyway schema as version 0
    out-of-order: false
    validate-on-migrate: true

  quartz:
    job-store-type: jdbc         # Persistent job store
    jdbc:
      initialize-schema: ${QUARTZ_INIT:never}  # 🔄 Changed from 'always' to 'never' because Flyway V5 manages it now
    properties:
      org.quartz.jobStore.driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate

# 🔄 Added JWT configuration block to allow Render to inject a secure production key
jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: 86400000

server:
  port: 8080