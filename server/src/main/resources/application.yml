spring:
  application:
    name: pingguard-server

  datasource:
    url: jdbc:postgresql://localhost:5433/pingguard
    username: pingguard_admin
    password: my_super_secret_password_123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns schema; Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true     # Baseline existing DB so V1 is not re-run
    baseline-version: 0           # Treat any pre-Flyway schema as version 0
    out-of-order: false
    validate-on-migrate: true

  quartz:
    job-store-type: jdbc         # Persistent job store
    jdbc:
      initialize-schema: always  # Auto-create Quartz tables
    properties:
      org.quartz.jobStore.driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate

server:
  port: 8080
